<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediMind | AI Health Dashboard</title>
    <!-- Premium UI Frameworks via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0f172a;
            --primary: #4cc9f0;
            --glass: rgba(30, 41, 59, 0.7);
        }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            color: #f8fafc;
            min-height: 100vh;
        }
        .glass {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .ai-glow {
            filter: drop-shadow(0 0 15px rgba(76, 201, 240, 0.4));
        }
        @keyframes pulse-custom {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
        .pulse-once { animation: pulse-custom 2s infinite ease-in-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [alerts, setAlerts] = useState([]);
            const [patients, setPatients] = useState([
                { id: 'MM-1002', name: 'Samuel Wright', risk: 'Critical', age: 58, findings: ['Atrial Fib', 'Warfarin'] },
                { id: 'MM-2034', name: 'Robert Jackson', risk: 'Moderate', age: 45, findings: ['Diabetes II', 'Metformin'] }
            ]);

            useEffect(() => {
                lucide.createIcons();
                initChart();
                // Simulate WebSocket connection
                const timer = setTimeout(() => {
                    addAlert("Dr. Sarah Chen, new critical analysis ready for Elena Martinez.");
                }, 3000);
                return () => clearTimeout(timer);
            }, []);

            const addAlert = (msg) => {
                setAlerts(prev => [msg, ...prev].slice(0, 5));
            };

            const initChart = () => {
                const options = {
                    series: [14, 86],
                    chart: { type: 'donut', height: 200, foreColor: '#94a3b8' },
                    labels: ['High Risk', 'Stable'],
                    colors: ['#f72585', '#4cc9f0'],
                    stroke: { show: false },
                    legend: { show: false },
                    dataLabels: { enabled: false },
                    plotOptions: { pie: { donut: { size: '80%' } } }
                };
                new ApexCharts(document.querySelector("#risk-chart"), options).render();
            };

            const handleProcess = () => {
                setIsAnalyzing(true);
                setTimeout(() => {
                    setIsAnalyzing(false);
                    const newPatient = { id: 'MM-5001', name: 'Michael Ross', risk: 'High', age: 29, findings: ['Bronchitis'] };
                    setPatients(prev => [newPatient, ...prev]);
                    addAlert("Real-time Alert: AI detected High Risk for Michael Ross.");
                    lucide.createIcons();
                }, 3000);
            };

            return (
                <div className="flex min-h-screen">
                    {/* Sidebar */}
                    <aside className="w-64 glass p-6 border-r border-slate-800">
                        <div className="flex items-center gap-3 mb-10">
                            <div className="w-10 h-10 bg-cyan-500 rounded-xl flex items-center justify-center ai-glow">
                                <i data-lucide="brain-circuit" className="text-white w-6 h-6"></i>
                            </div>
                            <span className="text-xl font-bold">Medi<span className="text-cyan-400">Mind</span></span>
                        </div>
                        <nav className="space-y-4">
                            <NavItem icon="layout-dashboard" label="Dashboard" active />
                            <NavItem icon="users" label="Patients" />
                            <NavItem icon="zap" label="AI Alerts" />
                            <NavItem icon="settings" label="Settings" />
                        </nav>
                        
                        <div className="mt-auto pt-40">
                             <div className="bg-slate-800/50 p-4 rounded-2xl flex items-center gap-3">
                                <div className="w-8 h-8 rounded-full bg-cyan-500/20 text-cyan-400 flex items-center justify-center text-xs font-bold">SC</div>
                                <div>
                                    <p className="text-xs font-bold">Dr. S. Chen</p>
                                    <p className="text-[10px] text-slate-500">Administrator</p>
                                </div>
                             </div>
                        </div>
                    </aside>

                    {/* Main */}
                    <main className="flex-1 p-8">
                        <header className="flex justify-between items-center mb-10">
                            <div>
                                <h1 className="text-3xl font-bold tracking-tight mb-1">Clinical Intelligence Hub</h1>
                                <p className="text-slate-400 text-sm">Autonomous real-time medical entity extraction and risk scoring.</p>
                            </div>
                            <div className="flex gap-3">
                                <button className="glass p-2 rounded-full relative">
                                    <i data-lucide="bell" className="w-5 h-5"></i>
                                    {alerts.length > 0 && <span className="absolute top-1 right-1 w-2 h-2 bg-pink-500 rounded-full animate-pulse"></span>}
                                </button>
                                <div className="h-10 px-4 flex items-center bg-slate-800/50 rounded-full text-xs font-mono text-cyan-400 border border-cyan-500/10">
                                    Kafka Stream: ACTIVE
                                </div>
                            </div>
                        </header>

                        <div className="grid grid-cols-12 gap-8">
                            {/* Left Col */}
                            <div className="col-span-8 space-y-8">
                                {/* Processor Card */}
                                <div className="glass rounded-3xl p-8 relative overflow-hidden group">
                                    <h2 className="text-xl font-bold mb-6 flex items-center gap-2">
                                        <i data-lucide="upload-cloud" className="w-5 h-5 text-cyan-400"></i>
                                        Live Report Processing
                                    </h2>
                                    
                                    {!isAnalyzing ? (
                                        <div className="border-2 border-dashed border-slate-700/50 rounded-2xl p-12 flex flex-col items-center justify-center text-center transition-all hover:border-cyan-500/40 cursor-pointer" onClick={handleProcess}>
                                            <div className="w-16 h-16 bg-slate-800 rounded-2xl flex items-center justify-center mb-4 text-slate-500 group-hover:text-cyan-400 transition-all">
                                                <i data-lucide="file-text" className="w-8 h-8"></i>
                                            </div>
                                            <p className="text-slate-400 text-sm mb-1">Click to Upload Medical Report</p>
                                            <p className="text-[10px] text-slate-600">Supports PDF, CSV, and Text files</p>
                                        </div>
                                    ) : (
                                        <div className="p-12 flex flex-col items-center justify-center text-center">
                                            <div className="w-16 h-16 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                                            <p className="text-cyan-400 font-bold mb-2">EXTRACTING ENTITIES...</p>
                                            <div className="w-64 bg-slate-800 h-1.5 rounded-full overflow-hidden">
                                                <div className="bg-cyan-500 h-full w-[65%] animate-[pulse_1.5s_infinite]"></div>
                                            </div>
                                        </div>
                                    )}

                                    <div className="mt-8 pt-8 border-t border-slate-800 flex items-center justify-between">
                                        <div className="flex items-center gap-3">
                                            <button className="w-12 h-12 bg-slate-800 rounded-full flex items-center justify-center text-white hover:bg-pink-500 transition-all pulse-once">
                                                <i data-lucide="mic" className="w-5 h-5"></i>
                                            </button>
                                            <p className="text-xs text-slate-400">Whisper Voice Core dictation enabled.</p>
                                        </div>
                                        <div className="text-[10px] font-mono text-slate-500">
                                            FAISS INDEX: v4.2.0-LATEST
                                        </div>
                                    </div>
                                </div>

                                {/* Table */}
                                <div className="glass rounded-3xl overflow-hidden">
                                    <div className="p-6 border-b border-slate-800"><h3 className="font-bold">Extraction History</h3></div>
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-800/30 text-[10px] text-slate-500 uppercase font-bold tracking-wider">
                                            <tr>
                                                <th className="px-6 py-4">Patient</th>
                                                <th className="px-6 py-4">Status</th>
                                                <th className="px-6 py-4">Key Findings</th>
                                                <th className="px-6 py-4">Action</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-800">
                                            {patients.map(p => (
                                                <tr key={p.id} className="hover:bg-slate-800/20 transition-all text-sm">
                                                    <td className="px-6 py-4">
                                                        <div className="font-medium">{p.name}</div>
                                                        <div className="text-[10px] text-slate-500">ID: {p.id}</div>
                                                    </td>
                                                    <td className="px-6 py-4">
                                                        <span className={`px-2 py-1 rounded-md text-[10px] font-bold ${p.risk === 'Critical' ? 'bg-pink-500/20 text-pink-500' : 'bg-amber-500/20 text-amber-500'}`}>
                                                            {p.risk}
                                                        </span>
                                                    </td>
                                                    <td className="px-6 py-4">
                                                        <div className="flex gap-1">
                                                            {p.findings.map(f => (
                                                                <span key={f} className="bg-cyan-500/10 text-cyan-400 px-2 py-0.5 rounded-full text-[10px]">{f}</span>
                                                            ))}
                                                        </div>
                                                    </td>
                                                    <td className="px-6 py-4">
                                                        <button className="text-slate-500 hover:text-white transition-all"><i data-lucide="eye" className="w-4 h-4"></i></button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                            {/* Right Col */}
                            <div className="col-span-4 space-y-8">
                                <div className="glass rounded-3xl p-6">
                                    <h3 className="font-bold mb-4">Patient Risk Scoring</h3>
                                    <div id="risk-chart" className="mb-4"></div>
                                    <div className="space-y-2">
                                        <div className="flex justify-between text-xs"><span className="text-slate-500">High Severity</span><span className="text-pink-500">14%</span></div>
                                        <div className="w-full bg-slate-800 h-1.5 rounded-full"><div className="bg-pink-500 h-full w-[14%]"></div></div>
                                    </div>
                                </div>

                                <div className="glass rounded-3xl p-6 border-l-4 border-cyan-500">
                                    <h3 className="font-bold mb-4 flex items-center gap-2">
                                        <i data-lucide="bell-ring" className="w-4 h-4 text-cyan-400"></i>
                                        Recent Alerts
                                    </h3>
                                    <div className="space-y-4">
                                        {alerts.length === 0 && <p className="text-xs text-slate-500 italic">Listening for streaming data...</p>}
                                        {alerts.map((a, i) => (
                                            <div key={i} className="text-xs p-3 bg-slate-800/50 rounded-xl border border-slate-700 animate-[fadeIn_0.5s_ease-out]">
                                                {a}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const NavItem = ({ icon, label, active }) => (
            <div className={`flex items-center gap-4 px-4 py-3 rounded-xl cursor-pointer transition-all ${active ? 'bg-cyan-500/10 text-cyan-400' : 'text-slate-400 hover:bg-slate-800/50 hover:text-white'}`}>
                <i data-lucide={icon} className="w-5 h-5"></i>
                <span className="text-sm font-medium">{label}</span>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
