services:
  # 1. Main API Gateway (Node.js)
  - type: web
    name: medimind-api
    env: node
    rootDir: backend/main_api
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 3001

  # 2. AI Engine (FastAPI)
  - type: web
    name: medimind-ai
    env: python
    rootDir: backend/ai_service
    buildCommand: pip install fastapi uvicorn
    startCommand: uvicorn main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: PORT
        value: 8000

  # 3. Frontend (Static Site)
  - type: web
    name: medimind-web
    env: static
    rootDir: frontend
    buildCommand: "" # No build step needed for CDN React
    publishDir: .
