services:
  - type: web
    name: medimind-api
    env: node
    rootDir: backend/main_api
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 3001

  - type: web
    name: medimind-ai
    env: python
    rootDir: backend/ai_service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: PORT
        value: 8000

  - type: static
    name: medimind-web
    env: static
    rootDir: frontend
    buildCommand: ""
    publishDir: .
    staticPublishCustomHeaders: []
